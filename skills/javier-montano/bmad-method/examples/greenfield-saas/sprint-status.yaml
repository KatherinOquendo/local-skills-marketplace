    notes: "Completed day 3. Clerk integration clean. Webhook sync working."

  - id: "STORY-002"
    title: "User signup with onboarding flow"
    status: "In Progress"
    points: 5
    assigned_to: "Jordan Rivera"
    branch: "feature/STORY-002-signup-onboarding"
    notes: "Signup page done. Onboarding UI in progress. Backend procedures ready."

  - id: "STORY-003"
    title: "Team invitation and member management"
    status: "To Do"
    points: 3
    assigned_to: "Alex Chen"
