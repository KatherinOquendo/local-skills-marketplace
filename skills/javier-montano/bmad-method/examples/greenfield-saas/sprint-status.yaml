# --- LESSONS LEARNED ---
# This sprint-status.yaml demonstrates:
# 1. Daily notes capture DECISIONS, not just status updates
# 2. Burndown shows realistic progress (days 1-2 had no points completed)
# 3. STORY-003 notes explain WHY it is blocked (dependency on STORY-002)
# 4. Velocity is conservative (3 pts) for a first sprint — this establishes baseline
# 5. The sprint goal is value-oriented ("users can sign up, log in, and create")
#
# DECISIONS MADE:
# - Sprint length of 10 working days (2 weeks) for a 2-person team
# - All 3 auth stories in Sprint 1 to establish the foundation
# - Conservative velocity baseline (3 pts completed at day 6 of 10)
